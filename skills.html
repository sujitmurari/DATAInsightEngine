<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataNexus | Skills</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div class="boot-screen" data-boot>
    <div class="boot-card">
      <h2 class="boot-title">SYSTEM BOOT</h2>
      <ul class="boot-log" data-boot-log></ul>
      <div class="boot-progress-wrap"><div class="boot-progress" data-boot-progress></div></div>
      <div class="boot-percent">0% <span class="cursor" data-boot-percent></span></div>
    </div>
  </div>

  <canvas id="matrix"></canvas>
  <div class="grid-overlay"></div>
  <div class="radar"></div>

  <div class="wrapper">
    <header class="topbar">
      <nav class="nav">
        <div class="brand">DATANEXUS COMMAND</div>
        <div class="links">
          <a href="./index.html">HOME</a>
          <a class="active" href="./skills.html">SKILLS</a>
          <a href="./projects.html">PROJECTS</a>
          <a href="./about.html">ABOUT</a>
          <a href="./connect.html">CONNECT</a>
          <a href="./contact.html">CONTACT</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section panel">
        <h1>Skill Diagnostics</h1>

        <div class="skill-row">
          <div class="skill-head"><span>Tableau</span><span>92%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="92"></div></div>
        </div>

        <div class="skill-row">
          <div class="skill-head"><span>Excel</span><span>89%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="89"></div></div>
        </div>

        <div class="skill-row">
          <div class="skill-head"><span>SQL</span><span>76%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="76"></div></div>
        </div>

        <div class="skill-row">
          <div class="skill-head"><span>Python</span><span>73%</span></div>
          <div class="skill-track"><div class="skill-fill" data-level="73"></div></div>
        </div>
      </section>
    </main>

    <footer class="footer">ANALYTICS SKILL METRICS ONLINE</footer>
  </div>

  <script src="./assets/js/loader.js"></script>
  <script src="./assets/js/script.js"></script>
</body>
</html>
